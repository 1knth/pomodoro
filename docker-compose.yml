services:
  pomodoro:
    build: .
    container_name: pomodoro
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 5001
    ports:
      # Safe: backend is only reachable from this VPS. Caddy proxies public HTTPS.
      - "127.0.0.1:5001:5001"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5001/api/atmosphere"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
